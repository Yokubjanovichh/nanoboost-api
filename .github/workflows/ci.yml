name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

env:
  PYTHON_VERSION: "3.12"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ---------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          uv venv --python ${{ env.PYTHON_VERSION }} .venv
          uv pip install -e ".[dev]"

      - name: Ruff check
        run: .venv/bin/ruff check .

      - name: Ruff format
        run: .venv/bin/ruff format --check .

  # ---------------------------------------------------------------------
  test-unit:
    runs-on: ubuntu-latest
    needs: lint
    env:
      ENVIRONMENT: test
      DATABASE_URL: sqlite+aiosqlite:///:memory:
      JWT_SECRET_KEY: ci-test-secret-must-be-at-least-32-chars-long
      CORS_ORIGINS: '["http://localhost:3000"]'

    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          uv venv --python ${{ env.PYTHON_VERSION }} .venv
          uv pip install -e ".[dev]"

      - name: Pytest (SQLite — fast suite)
        run: .venv/bin/pytest -q --tb=short

  # ---------------------------------------------------------------------
  test-integration:
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nanoboost
          POSTGRES_PASSWORD: nanoboost
          POSTGRES_DB: nanoboost_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      ENVIRONMENT: test
      DATABASE_URL: postgresql+asyncpg://nanoboost:nanoboost@localhost:5432/nanoboost_test
      JWT_SECRET_KEY: ci-test-secret-must-be-at-least-32-chars-long
      CORS_ORIGINS: '["http://localhost:3000"]'

    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          uv venv --python ${{ env.PYTHON_VERSION }} .venv
          uv pip install -e ".[dev]"

      - name: Apply Alembic migrations
        run: .venv/bin/alembic upgrade head

      - name: Run integration tests
        run: .venv/bin/pytest -q -m integration --tb=short

  # ---------------------------------------------------------------------
  build:
    needs: [test-unit, test-integration]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------
  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Railway deploy
        env:
          RAILWAY_DEPLOY_HOOK: ${{ secrets.RAILWAY_DEPLOY_HOOK }}
        run: |
          if [ -z "$RAILWAY_DEPLOY_HOOK" ]; then
            echo "RAILWAY_DEPLOY_HOOK secret not set — skipping deploy"
            exit 0
          fi
          curl -fsS -X POST "$RAILWAY_DEPLOY_HOOK" \
            -H "Content-Type: application/json" \
            -d "{\"image\": \"${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}\"}"
