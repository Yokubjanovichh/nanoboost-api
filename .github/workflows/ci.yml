name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

env:
  PYTHON_VERSION: "3.12"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ---------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Verify uv.lock is in sync with pyproject.toml
        # Guards against the failure mode that took prod down on deploy
        # 2df57132: pyproject.toml got a new dep but uv.lock wasn't
        # regenerated, so the Docker build's `uv sync --frozen` shipped a
        # container missing the dependency. Fail CI here instead of finding
        # out in Railway.
        run: uv lock --check

      - name: Install dependencies
        run: |
          uv venv --python ${{ env.PYTHON_VERSION }} .venv
          uv pip install -e ".[dev]"

      - name: Ruff check
        run: .venv/bin/ruff check .

      - name: Ruff format
        run: .venv/bin/ruff format --check .

  # ---------------------------------------------------------------------
  build:
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------
  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Railway deploy
        env:
          RAILWAY_DEPLOY_HOOK: ${{ secrets.RAILWAY_DEPLOY_HOOK }}
        run: |
          if [ -z "$RAILWAY_DEPLOY_HOOK" ]; then
            echo "RAILWAY_DEPLOY_HOOK secret not set — skipping deploy"
            exit 0
          fi
          curl -fsS -X POST "$RAILWAY_DEPLOY_HOOK" \
            -H "Content-Type: application/json" \
            -d "{\"image\": \"${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}\"}"
