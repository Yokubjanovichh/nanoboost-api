name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

env:
  PYTHON_VERSION: "3.12"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ---------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Verify uv.lock is in sync with pyproject.toml
        # Guards against the failure mode that took prod down on deploy
        # 2df57132: pyproject.toml got a new dep but uv.lock wasn't
        # regenerated, so the Docker build's `uv sync --frozen` shipped a
        # container missing the dependency. Fail CI here instead of finding
        # out in Railway.
        run: uv lock --check

      - name: Install dependencies
        run: |
          uv venv --python ${{ env.PYTHON_VERSION }} .venv
          uv pip install -e ".[dev]"

      - name: Ruff check
        run: .venv/bin/ruff check .

      - name: Ruff format
        run: .venv/bin/ruff format --check .

  # ---------------------------------------------------------------------
  test:
    needs: lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_USER: postgres
          POSTGRES_DB: nanoboost_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:testpass@localhost:5432/nanoboost_test
      JWT_SECRET_KEY: ci-test-secret-key-not-for-prod-32+chars-x
      AUTO_CANCEL_PENDING_ENABLED: "false"
      # Tests inject fakeredis directly, so this URL isn't actually used by
      # the suite — it's here so cache_status() reports a non-disabled
      # value on the rare integration test that touches /health without
      # the fakeredis fixture.
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          uv venv --python ${{ env.PYTHON_VERSION }} .venv
          uv pip install -e ".[dev]"
          uv pip install pytest-cov

      - name: Apply migrations
        run: .venv/bin/alembic upgrade head

      - name: Run test suite with coverage
        run: |
          .venv/bin/pytest tests/ \
            --cov=app \
            --cov-report=term \
            --cov-report=xml \
            --cov-fail-under=60 \
            -v

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_id }}
          path: coverage.xml
          if-no-files-found: ignore

  # ---------------------------------------------------------------------
  build:
    # Build on every PR + every push-to-main. Push to GHCR only happens
    # on main — PRs prove the image can be assembled without polluting
    # the registry. This is what lets us require `build` as a status
    # check on PRs (a missing post-merge job would block merge forever).
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        # GHA's default docker driver doesn't support `cache-to type=gha`.
        # setup-buildx installs the docker-container driver which does.
        # Failure mode without this step:
        #   "Cache export is not supported for the docker driver"
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------
  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Railway deploy
        env:
          RAILWAY_DEPLOY_HOOK: ${{ secrets.RAILWAY_DEPLOY_HOOK }}
        run: |
          if [ -z "$RAILWAY_DEPLOY_HOOK" ]; then
            echo "RAILWAY_DEPLOY_HOOK secret not set — skipping deploy"
            exit 0
          fi
          curl -fsS -X POST "$RAILWAY_DEPLOY_HOOK" \
            -H "Content-Type: application/json" \
            -d "{\"image\": \"${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}\"}"
