services:
  postgres:
    image: postgres:16-alpine
    container_name: nanoboost-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nanoboost
      POSTGRES_PASSWORD: nanoboost
      POSTGRES_DB: nanoboost
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nanoboost -d nanoboost"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Phase 7 — ephemeral Postgres for integration tests (no volume).
  # Start with: docker compose --profile test up -d postgres-test
  # Run tests:  docker compose run --rm api pytest -m integration
  postgres-test:
    image: postgres:16-alpine
    container_name: nanoboost-postgres-test
    profiles: ["test"]
    environment:
      POSTGRES_USER: nanoboost
      POSTGRES_PASSWORD: nanoboost
      POSTGRES_DB: nanoboost_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nanoboost -d nanoboost_test"]
      interval: 3s
      timeout: 3s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data  # ephemeral — fresh state each `up`

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nanoboost-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./tests:/app/tests
      - ./alembic.ini:/app/alembic.ini
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             python -m app.scripts.create_superuser &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data:
  uploads_data:
